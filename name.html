<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sourav Gaur & Shoel</title>
    <style>
        /* Reset margins and set up full screen */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #0b0c10;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* Container styling with a subtle glass card look */
        .display-card {
            text-align: center;
            background: rgba(255, 255, 255, 0.03);
            padding: 50px 60px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
        }

        /* Core heading setup */
        h1 {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: -1px;
            line-height: 1.2;
        }

        /* Color and neon glow effect for Sourav Gaur */
        .sourav {
            color: #ff4a5a;
            text-shadow: 0 0 10px rgba(255, 74, 90, 0.6),
                         0 0 30px rgba(255, 74, 90, 0.3);
        }

        /* Stylized Ampersand (&) */
        .and {
            color: #ffffff;
            font-size: 2.8rem;
            font-family: 'Georgia', serif;
            font-style: italic;
            margin: 0 15px;
            opacity: 0.9;
        }

        /* Color and neon glow effect for Shoel */
        .shoel {
            color: #00f5ff;
            text-shadow: 0 0 10px rgba(0, 245, 255, 0.6),
                         0 0 30px rgba(0, 245, 255, 0.3);
        }

        /* Animated underline effect */
        .line {
            height: 3px;
            width: 80px;
            background: linear-gradient(90deg, #ff4a5a, #00f5ff);
            margin: 25px auto 0 auto;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div class="display-card">
        <h1>
            <span class="sourav">Sourav Gaur</span>
            <span class="and">&amp;</span>
            <span class="shoel">Shoel</span>
        </h1>
        <div class="line"></div>
    </div>

</body>
</html>
